# Isolated run profiles — ONE service per vulnerable server.
#
# Each service runs a standalone, ordinary-looking MCP server that harbours a
# single latent vulnerability.
#
# Containment hardening (shared via the `&hardening` anchor): NO network,
# read-only root filesystem, dropped Linux capabilities, no privilege escalation.
# Because these servers are deliberately vulnerable, these limits keep a
# successful exploit boxed inside the container.
#
# Usage (stdio MCP server — attach an MCP client to its stdin/stdout):
#   docker compose build
#   docker compose run --rm -T analytics                  # over-scoped tools / tool misuse
#   docker compose --profile danger run --rm -T calc      # real code execution — opt-in only

x-hardening: &hardening
  build: .
  image: mcploitable:latest
  stdin_open: true        # keep stdin open for stdio transport
  tty: false
  network_mode: "none"    # no outbound network — exfiltration can't leave
  read_only: true         # immutable root fs
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  mem_limit: 512m
  cpus: "1.0"
  pids_limit: 256
  tmpfs:
    - /tmp:size=16m        # read_only above; small writable scratch space only

services:
  mail:
    <<: *hardening
    entrypoint: ["mail-assistant"]        # ASI01 indirect prompt injection
  analytics:
    <<: *hardening
    entrypoint: ["analytics-bi"]          # ASI02 over-scoped tools / tool misuse
    environment:
      ASI02_STORE: /data/asi02_store.json
    volumes:
      - ./harness/asi02-store:/data
  recovery:
    <<: *hardening
    entrypoint: ["account-recovery"]      # ASI03 identity & privilege abuse
  toolhub:
    <<: *hardening
    entrypoint: ["plugin-hub"]            # ASI04 agentic supply chain
  memory:
    <<: *hardening
    entrypoint: ["memo-assistant"]      # ASI06 memory / context poisoning
  orchestrator:
    <<: *hardening
    entrypoint: ["ops-orchestrator"]    # ASI07 insecure agent-to-agent comms
  calc:
    <<: *hardening
    entrypoint: ["calc"]                  # ASI05 unexpected code execution
    profiles: ["danger"]                  # opt-in only — real code execution (see docs/SAFETY.md)
    volumes:
      - ./harness/asi05-store:/data       # operator score-log sink (ASI05_SCORE_LOG)
