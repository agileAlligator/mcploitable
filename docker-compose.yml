# Isolated run profiles — ONE service per vulnerable server.
#
# Each service runs a standalone, ordinary-looking MCP server that harbours a
# single latent vulnerability (the ASI tag records which class).
#
# Containment hardening (shared via the `&hardening` anchor): NO network,
# read-only root filesystem, dropped Linux capabilities, no privilege escalation.
# Because these servers are deliberately vulnerable, these limits keep a
# successful exploit boxed inside the container.
#
# Usage (stdio MCP server — attach an MCP client to its stdin/stdout):
#   docker compose build
#   docker compose run --rm -T helpdesk        # ASI01 — indirect prompt injection
#   docker compose run --rm -T calc            # ASI05 — code execution

x-hardening: &hardening
  build: .
  image: mcploitable:latest
  stdin_open: true        # keep stdin open for stdio transport
  tty: false
  network_mode: "none"    # no outbound network — exfiltration can't leave
  read_only: true         # immutable root fs
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  helpdesk:
    <<: *hardening
    entrypoint: ["helpdesk-ASI01"]        # ASI01 — indirect prompt injection
  analytics:
    <<: *hardening
    entrypoint: ["analytics-ASI02"]       # ASI02 — over-scoped tools
  ops:
    <<: *hardening
    entrypoint: ["ops-assistant-ASI03"]   # ASI03 — confused-deputy privilege abuse
  toolhub:
    <<: *hardening
    entrypoint: ["toolhub-ASI04"]         # ASI04 — agentic supply chain
  calc:
    <<: *hardening
    entrypoint: ["calc-service-ASI05"]    # ASI05 — unexpected code execution
